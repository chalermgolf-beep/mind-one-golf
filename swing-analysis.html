<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mind One Golf — Swing Analysis</title>
<style>
  :root {
    --bg:#050a12; --surface:#0c1624; --border:rgba(255,255,255,0.08);
    --ink:#e8edf5; --dim:#5a6a82;
    --c1:#00e5ff; --c2:#ff6b35; --gold:#ffd166; --green:#06d6a0; --purple:#9b5de5;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--ink);font-family:'Sarabun','Tahoma',Arial,sans-serif;font-size:14px;min-height:100vh;}
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
  .topbar-title{font-family:'Courier New',monospace;font-size:11px;letter-spacing:2px;color:var(--c1);}
  .slide-counter{font-family:'Courier New',monospace;font-size:12px;color:var(--dim);}
  .slide-counter span{color:var(--gold);}
  .progress-bar{height:3px;background:rgba(255,255,255,0.05);}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--c1),var(--c2));transition:width 0.3s;}
  .main{max-width:900px;margin:0 auto;padding:24px 16px 100px;}
  .slide{display:none;}
  .slide.active{display:block;}
  .slide-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
  .slide-num{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:20px;flex-shrink:0;}
  .slide-meta h2{font-size:18px;font-weight:700;margin-bottom:4px;}
  .phase-tag{font-family:'Courier New',monospace;font-size:9px;letter-spacing:2px;padding:2px 10px;border-radius:10px;}

  /* IMAGE ZONE */
  .img-zone{border-radius:16px;margin-bottom:16px;background:var(--surface);border:2px dashed rgba(0,229,255,0.2);position:relative;overflow:hidden;}
  .img-zone.has-img{border-style:solid;border-color:var(--border);}
  .img-zone img{width:100%;max-height:460px;object-fit:contain;display:block;}
  .img-placeholder{padding:24px 16px;text-align:center;}
  .img-placeholder .icon{font-size:40px;margin-bottom:10px;opacity:0.35;}
  .img-placeholder p{color:var(--dim);font-size:13px;margin-bottom:14px;}

  /* UPLOAD BUTTONS */
  .upload-methods{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:480px;margin:0 auto 14px;}
  .method-btn{border-radius:12px;padding:14px 10px;text-align:center;cursor:pointer;border:none;font-family:'Tahoma',Arial,sans-serif;font-size:13px;font-weight:700;transition:all 0.2s;}
  .method-file{background:var(--c1);color:#050a12;}
  .method-file:hover{background:#00ccee;}
  .method-url{background:rgba(255,209,102,0.15);color:var(--gold);border:1px solid rgba(255,209,102,0.3);}
  .method-url:hover{background:rgba(255,209,102,0.25);}
  .method-icon{font-size:22px;display:block;margin-bottom:6px;}
  .method-sub{font-size:10px;font-weight:400;opacity:0.8;display:block;margin-top:2px;}

  /* URL INPUT */
  .url-panel{display:none;max-width:480px;margin:0 auto;padding:0 0 8px;}
  .url-panel.show{display:block;}
  .url-row{display:flex;gap:8px;}
  .url-input{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(0,229,255,0.2);color:var(--ink);padding:10px 12px;border-radius:10px;font-size:13px;outline:none;}
  .url-input:focus{border-color:var(--c1);}
  .url-input::placeholder{color:var(--dim);}
  .url-go{background:var(--c1);color:#050a12;border:none;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;}

  .change-btn{position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.65);border:1px solid rgba(255,255,255,0.15);color:var(--ink);padding:6px 12px;border-radius:8px;font-size:11px;cursor:pointer;}

  /* CONTENT */
  .content-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  @media(max-width:560px){.content-grid{grid-template-columns:1fr;}}
  .box{border-radius:12px;padding:13px 15px;}
  .box h4{font-family:'Courier New',monospace;font-size:9px;letter-spacing:2px;margin-bottom:7px;}
  .box ul{list-style:none;padding:0;}
  .box ul li{font-size:12px;color:#b0c0d8;padding:3px 0 3px 14px;position:relative;line-height:1.5;}
  .box ul li::before{content:'→';position:absolute;left:0;font-size:10px;opacity:0.5;}
  .box-c1{background:rgba(0,229,255,0.05);border:1px solid rgba(0,229,255,0.15);}
  .box-c1 h4{color:var(--c1);}
  .box-c2{background:rgba(255,107,53,0.05);border:1px solid rgba(255,107,53,0.15);}
  .box-c2 h4{color:var(--c2);}
  .box-gold{background:rgba(255,209,102,0.04);border:1px solid rgba(255,209,102,0.12);}
  .box-gold h4{color:var(--gold);}
  .box-purple{background:rgba(155,93,229,0.05);border:1px solid rgba(155,93,229,0.15);}
  .box-purple h4{color:var(--purple);}
  .box-green{background:rgba(6,214,160,0.04);border:1px solid rgba(6,214,160,0.15);}
  .box-green h4{color:var(--green);}
  .feeling{border-radius:12px;padding:13px 16px;margin-top:4px;display:flex;gap:10px;align-items:flex-start;font-size:13px;font-weight:600;line-height:1.5;}
  .feeling-c1{background:rgba(0,229,255,0.08);border:1px solid rgba(0,229,255,0.2);color:var(--c1);}
  .feeling-c2{background:rgba(255,107,53,0.08);border:1px solid rgba(255,107,53,0.2);color:var(--c2);}
  .feeling-green{background:rgba(6,214,160,0.06);border:1px solid rgba(6,214,160,0.15);color:var(--green);}
  .feeling-gold{background:rgba(255,209,102,0.07);border:1px solid rgba(255,209,102,0.2);color:var(--gold);}
  .feeling-icon{font-size:20px;flex-shrink:0;}
  .fault{background:rgba(239,35,60,0.05);border:1px solid rgba(239,35,60,0.2);border-radius:12px;padding:11px 14px;margin-top:10px;}
  .fault h4{font-family:'Courier New',monospace;font-size:9px;letter-spacing:2px;color:#ef233c;margin-bottom:5px;}
  .fault li{font-size:12px;color:#c97a85;padding:2px 0 2px 14px;position:relative;list-style:none;}
  .fault li::before{content:'✕';position:absolute;left:0;font-size:10px;}

  /* NAV */
  .nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .nav-btn{background:var(--surface);border:1px solid var(--border);color:var(--ink);padding:10px 20px;border-radius:10px;font-size:13px;cursor:pointer;font-family:'Tahoma',Arial,sans-serif;}
  .nav-btn:hover{border-color:var(--c1);color:var(--c1);}
  .nav-btn:disabled{opacity:0.3;cursor:not-allowed;}
  .nav-btn.primary{background:var(--c1);color:#050a12;border-color:var(--c1);font-weight:700;}
  .nav-dots{display:flex;gap:6px;align-items:center;}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--border);cursor:pointer;transition:all 0.2s;}
  .dot.active{background:var(--c1);width:20px;border-radius:4px;}
  input[type=file]{display:none;}
</style>
</head>
<body>
<div class="topbar">
  <span class="topbar-title">◆ MIND ONE GOLF · SWING ANALYSIS</span>
  <span class="slide-counter">Slide <span id="curSlide">1</span> / 7</span>
</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:14.3%"></div></div>
<div class="main" id="main"></div>
<div class="nav">
  <button class="nav-btn" id="prevBtn" onclick="changeSlide(-1)" disabled>← ก่อนหน้า</button>
  <div class="nav-dots" id="navDots"></div>
  <button class="nav-btn primary" id="nextBtn" onclick="changeSlide(1)">ถัดไป →</button>
</div>

var current=0, images=new Array(7).fill(null);

function buildSlides(){
  var main=document.getElementById('main'), dots=document.getElementById('navDots');
  main.innerHTML=''; dots.innerHTML='';
  slides.forEach(function(s,i){
    var d=document.createElement('div');
    d.className='dot'+(i===0?' active':'');
    d.onclick=(function(idx){return function(){goTo(idx);};})(i);
    dots.appendChild(d);
    var el=document.createElement('div');
    el.className='slide'+(i===0?' active':'');
    el.id='slide'+i;
    var boxHtml='<div class="content-grid">';
    s.boxes.forEach(function(b){
      boxHtml+='<div class="box '+b.cls+'"><h4>'+b.title+'</h4><ul>';
      b.items.forEach(function(it){boxHtml+='<li>'+it+'</li>';});
      boxHtml+='</ul></div>';
    });
    boxHtml+='</div>';
    var faultHtml='';
    if(s.fault){
      faultHtml='<div class="fault"><h4>⚠ FAULT</h4><ul>';
      s.fault.items.forEach(function(it){faultHtml+='<li>'+it+'</li>';});
      faultHtml+='</ul></div>';
    }
    el.innerHTML=
      '<div class="slide-header">'+
        '<div class="slide-num" style="background:'+s.bg+';border:2px solid '+s.color+';color:'+s.color+';">'+s.num+'</div>'+
        '<div class="slide-meta"><h2>'+s.title+'</h2>'+
          '<span class="phase-tag" style="background:'+s.phaseColor+';color:'+s.phaseText+';">'+s.phase+'</span>'+
        '</div>'+
      '</div>'+
      '<div class="img-zone" id="imgZone'+i+'">'+renderZone(i,s.num)+'</div>'+
      boxHtml+
      '<div class="'+s.feeling.cls+' feeling"><div class="feeling-icon">'+s.feeling.icon+'</div><div>'+s.feeling.text+'</div></div>'+
      faultHtml;
    main.appendChild(el);
  });
}

function renderZone(i,num){
  if(images[i]){
    return '<img src="'+images[i]+'" alt="Pos '+(i+1)+'">'+
           '<button class="change-btn" onclick="resetImg('+i+')">🔄 เปลี่ยนรูป</button>';
  }
  return '<div class="img-placeholder">'+
    '<div class="icon">🖼️</div>'+
    '<p>เพิ่มรูป Position '+num+'</p>'+
    '<div class="upload-methods">'+
      '<button class="method-btn method-file" onclick="triggerFile('+i+')">'+
        '<span class="method-icon">📁</span>เลือกจากเครื่อง'+
        '<span class="method-sub">Chrome / Safari</span>'+
      '</button>'+
      '<button class="method-btn method-url" onclick="toggleUrl('+i+')">'+
        '<span class="method-icon">🔗</span>วาง URL'+
        '<span class="method-sub">ทุก browser</span>'+
      '</button>'+
    '</div>'+
    '<div class="url-panel" id="urlPanel'+i+'">'+
      '<div class="url-row">'+
        '<input class="url-input" id="urlIn'+i+'" placeholder="https://..." type="url">'+
        '<button class="url-go" onclick="loadUrl('+i+')">โหลด</button>'+
      '</div>'+
    '</div>'+
    '<input type="file" id="fileIn'+i+'" accept="image/*" onchange="loadFile(event,'+i+')">'+
  '</div>';
}

function triggerFile(i){ document.getElementById('fileIn'+i).click(); }

function toggleUrl(i){
  var p=document.getElementById('urlPanel'+i);
  p.classList.toggle('show');
  if(p.classList.contains('show')) document.getElementById('urlIn'+i).focus();
}

function loadFile(e,i){
  var f=e.target.files[0]; if(!f) return;
  var r=new FileReader();
  r.onload=function(ev){ setImg(i, ev.target.result); };
  r.readAsDataURL(f);
}

function loadUrl(i){
  var url=document.getElementById('urlIn'+i).value.trim();
  if(!url){ alert('กรุณาใส่ URL ก่อนครับ'); return; }
  setImg(i, url);
}

function setImg(i, src){
  images[i]=src;
  var z=document.getElementById('imgZone'+i);
  z.classList.add('has-img');
  z.innerHTML='<img src="'+src+'" alt="Pos '+(i+1)+'" onerror="imgErr('+i+')">'+
               '<button class="change-btn" onclick="resetImg('+i+')">🔄 เปลี่ยนรูป</button>';
}

function imgErr(i){
  images[i]=null;
  var z=document.getElementById('imgZone'+i);
  z.classList.remove('has-img');
  z.innerHTML=renderZone(i,slides[i].num);
  alert('โหลดรูปไม่ได้ครับ — ลอง URL อื่น');
}

function resetImg(i){
  images[i]=null;
  var z=document.getElementById('imgZone'+i);
  z.classList.remove('has-img');
  z.innerHTML=renderZone(i,slides[i].num);
}

function goTo(idx){
  document.getElementById('slide'+current).classList.remove('active');
  document.querySelectorAll('.dot')[current].classList.remove('active');
  current=idx;
  document.getElementById('slide'+current).classList.add('active');
  document.querySelectorAll('.dot')[current].classList.add('active');
  document.getElementById('curSlide').textContent=current+1;
  document.getElementById('progressFill').style.width=((current+1)/7*100)+'%';
  document.getElementById('prevBtn').disabled=current===0;
  document.getElementById('nextBtn').disabled=current===6;
  document.getElementById('nextBtn').textContent=current===6?'✓ จบ':'ถัดไป →';
  window.scrollTo(0,0);
}
function changeSlide(dir){var n=current+dir;if(n>=0&&n<7)goTo(n);}
buildSlides();
</script>
</body>
</html>
