<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mind One Golf — Swing Analysis</title>
<style>
  :root{--bg:#050a12;--surface:#0c1624;--border:rgba(255,255,255,0.08);--ink:#e8edf5;--dim:#5a6a82;--c1:#00e5ff;--c2:#ff6b35;--gold:#ffd166;--green:#06d6a0;--purple:#9b5de5;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--ink);font-family:'Sarabun','Tahoma',Arial,sans-serif;font-size:14px;min-height:100vh;}
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
  .topbar-title{font-family:'Courier New',monospace;font-size:11px;letter-spacing:2px;color:var(--c1);}
  .slide-counter{font-family:'Courier New',monospace;font-size:12px;color:var(--dim);}
  .slide-counter span{color:var(--gold);}
  .progress-bar{height:3px;background:rgba(255,255,255,0.05);}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--c1),var(--c2));transition:width 0.3s;}
  .main{max-width:900px;margin:0 auto;padding:24px 16px 100px;}
  .slide{display:none;}
  .slide.active{display:block;}
  .slide-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
  .slide-num{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:20px;flex-shrink:0;}
  .slide-meta h2{font-size:18px;font-weight:700;margin-bottom:4px;}
  .phase-tag{font-family:'Courier New',monospace;font-size:9px;letter-spacing:2px;padding:2px 10px;border-radius:10px;}

  /* PHOTO GRID */
  .photo-wrap{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:12px;margin-bottom:16px;}
  .photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px;}
  .slot{border-radius:12px;overflow:hidden;background:#070e1a;border:2px dashed rgba(0,229,255,0.18);position:relative;aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color 0.2s;}
  .slot:hover{border-color:rgba(0,229,255,0.5);}
  .slot.filled{border:2px solid rgba(0,229,255,0.25);cursor:default;}
  .slot img{width:100%;height:100%;object-fit:cover;display:block;}
  .slot-ph{text-align:center;padding:10px 6px;pointer-events:none;}
  .slot-ph .ico{font-size:26px;display:block;margin-bottom:6px;opacity:0.3;}
  .slot-ph .lbl{font-size:10px;color:var(--dim);line-height:1.4;display:block;}
  .slot-ph .num{font-size:9px;color:var(--c1);font-family:'Courier New',monospace;letter-spacing:1px;display:block;margin-top:4px;}
  .slot-del{position:absolute;top:5px;right:5px;background:rgba(0,0,0,0.72);border:none;color:#fff;width:24px;height:24px;border-radius:50%;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .slot-del:hover{background:rgba(239,35,60,0.85);}
  .photo-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .pbtn{border-radius:10px;padding:10px 8px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:'Tahoma',Arial,sans-serif;transition:all 0.2s;}
  .pbtn-main{background:var(--c1);color:#050a12;}
  .pbtn-main:hover{background:#00ccee;}
  .pbtn-sec{background:rgba(0,229,255,0.08);color:var(--c1);border:1px solid rgba(0,229,255,0.2);}
  .pbtn-sec:hover{background:rgba(0,229,255,0.15);}
  .photo-status{text-align:center;font-size:11px;color:var(--dim);margin-top:8px;}
  .photo-status b{color:var(--green);}
  input[type=file]{display:none;}

  /* CONTENT */
  .content-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  @media(max-width:560px){.content-grid{grid-template-columns:1fr;}.photo-btns{grid-template-columns:1fr;}}
  .box{border-radius:12px;padding:13px 15px;}
  .box h4{font-family:'Courier New',monospace;font-size:9px;letter-spacing:2px;margin-bottom:7px;}
  .box ul{list-style:none;padding:0;}
  .box ul li{font-size:12px;color:#b0c0d8;padding:3px 0 3px 14px;position:relative;line-height:1.5;}
  .box ul li::before{content:'→';position:absolute;left:0;font-size:10px;opacity:0.5;}
  .box-c1{background:rgba(0,229,255,0.05);border:1px solid rgba(0,229,255,0.15);}
  .box-c1 h4{color:var(--c1);}
  .box-c2{background:rgba(255,107,53,0.05);border:1px solid rgba(255,107,53,0.15);}
  .box-c2 h4{color:var(--c2);}
  .box-gold{background:rgba(255,209,102,0.04);border:1px solid rgba(255,209,102,0.12);}
  .box-gold h4{color:var(--gold);}
  .box-purple{background:rgba(155,93,229,0.05);border:1px solid rgba(155,93,229,0.15);}
  .box-purple h4{color:var(--purple);}
  .box-green{background:rgba(6,214,160,0.04);border:1px solid rgba(6,214,160,0.15);}
  .box-green h4{color:var(--green);}
  .feeling{border-radius:12px;padding:13px 16px;margin-top:4px;display:flex;gap:10px;align-items:flex-start;font-size:13px;font-weight:600;line-height:1.5;}
  .feeling-c1{background:rgba(0,229,255,0.08);border:1px solid rgba(0,229,255,0.2);color:var(--c1);}
  .feeling-c2{background:rgba(255,107,53,0.08);border:1px solid rgba(255,107,53,0.2);color:var(--c2);}
  .feeling-green{background:rgba(6,214,160,0.06);border:1px solid rgba(6,214,160,0.15);color:var(--green);}
  .feeling-gold{background:rgba(255,209,102,0.07);border:1px solid rgba(255,209,102,0.2);color:var(--gold);}
  .feeling-icon{font-size:20px;flex-shrink:0;}
  .fault{background:rgba(239,35,60,0.05);border:1px solid rgba(239,35,60,0.2);border-radius:12px;padding:11px 14px;margin-top:10px;}
  .fault h4{font-family:'Courier New',monospace;font-size:9px;letter-spacing:2px;color:#ef233c;margin-bottom:5px;}
  .fault li{font-size:12px;color:#c97a85;padding:2px 0 2px 14px;position:relative;list-style:none;}
  .fault li::before{content:'✕';position:absolute;left:0;font-size:10px;}

  /* PDF BUTTON */
  .pdf-btn{position:fixed;top:10px;right:16px;background:linear-gradient(135deg,#ffd166,#ff9f1c);color:#1a0e00;border:none;padding:8px 18px 8px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Tahoma',Arial,sans-serif;z-index:999;display:flex;align-items:center;gap:7px;box-shadow:0 2px 12px rgba(255,209,102,0.35);transition:all 0.2s;letter-spacing:0.5px;}
  .pdf-btn:hover{background:linear-gradient(135deg,#ffe599,#ffb733);box-shadow:0 4px 20px rgba(255,209,102,0.5);transform:translateY(-1px);}
  .pdf-icon{width:22px;height:22px;background:rgba(0,0,0,0.15);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
  .pdf-label{display:flex;flex-direction:column;line-height:1.2;}
  .pdf-label span:first-child{font-size:11px;font-weight:700;}
  .pdf-label span:last-child{font-size:9px;font-weight:400;opacity:0.7;}

  /* NAV */
  .nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .nav-btn{background:var(--surface);border:1px solid var(--border);color:var(--ink);padding:10px 20px;border-radius:10px;font-size:13px;cursor:pointer;font-family:'Tahoma',Arial,sans-serif;}
  .nav-btn:hover{border-color:var(--c1);color:var(--c1);}
  .nav-btn:disabled{opacity:0.3;cursor:not-allowed;}
  .nav-btn.primary{background:var(--c1);color:#050a12;border-color:var(--c1);font-weight:700;}
  .nav-dots{display:flex;gap:6px;align-items:center;}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--border);cursor:pointer;transition:all 0.2s;}
  .dot.active{background:var(--c1);width:20px;border-radius:4px;}

  /* PRINT */
  @media print{
    *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
    .topbar,.nav,.pdf-btn,.slot-del,.photo-btns,.photo-status,.progress-bar{display:none!important;}
    body{background:#0a0f1a!important;}
    .main{padding:0!important;max-width:100%!important;}
    .slide{display:block!important;page-break-after:always;break-after:page;padding:20px 24px;}
    .slide::before{content:'';display:block;height:4px;background:linear-gradient(90deg,#00e5ff,#ff6b35,#ffd166);margin-bottom:16px;border-radius:2px;}
    .slide::after{content:'MIND ONE GOLF';position:fixed;bottom:16px;right:24px;font-family:'Courier New',monospace;font-size:9px;letter-spacing:3px;color:rgba(255,255,255,0.15);}
    .photo-wrap{background:#0c1624!important;border-color:rgba(255,255,255,0.08)!important;}
    .slot{border-color:rgba(0,229,255,0.15)!important;}
    .slot-ph{display:none!important;}
    @page{margin:10mm;size:A4 portrait;}
  }
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">◆ MIND ONE GOLF · SWING ANALYSIS</span>

</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:14.3%"></div></div>

<button class="pdf-btn" onclick="window.print()">
  <div class="pdf-icon">📄</div>
  <div class="pdf-label"><span>บันทึก PDF</span><span>ทุก 7 positions</span></div>
</button>

<div class="main" id="main"></div>

<div class="nav">
  <button class="nav-btn" id="prevBtn" onclick="changeSlide(-1)" disabled>← ก่อนหน้า</button>
  <div class="nav-dots" id="navDots"></div>
  <button class="nav-btn primary" id="nextBtn" onclick="changeSlide(1)">ถัดไป →</button>
</div>

        '<div class="slot-ph">'+
          '<span class="ico">📷</span>'+
          '<span class="lbl">'+LABELS[j]+'</span>'+
          '<span class="num">รูปที่ '+(j+1)+'</span>'+
        '</div>'+
      '</div>';
    }
  }
  var filled=photos[si].filter(function(p){return p!==null;}).length;
  return '<div class="photo-wrap">'+
    '<div class="photo-grid">'+slots+'</div>'+
    '<div class="photo-btns">'+
      '<button class="pbtn pbtn-main" onclick="pickMulti('+si+')">📁 อัปโหลดพร้อมกัน (1-3 รูป)</button>'+
      '<button class="pbtn pbtn-sec" onclick="pickOne('+si+','+nextEmpty(si)+')">+ เพิ่มทีละรูป</button>'+
    '</div>'+
    '<div class="photo-status"><b>'+filled+'/3</b> รูป'+(filled===3?' · ✓ ครบแล้ว':' · ยังเหลือ '+(3-filled)+' ช่อง')+'</div>'+
    '<input type="file" id="fOne'+si+'" accept="image/*" style="display:none" onchange="onOne(event,'+si+')">'+
    '<input type="file" id="fMulti'+si+'" accept="image/*" multiple style="display:none" onchange="onMulti(event,'+si+')">'+
  '</div>';
}

function nextEmpty(si){
  for(var j=0;j<3;j++) if(!photos[si][j]) return j;
  return 0;
}

function pickOne(si,j){
  pendingSlide=si; pendingSlot=j;
  document.getElementById('fOne'+si).click();
}

function pickMulti(si){
  pendingSlide=si;
  document.getElementById('fMulti'+si).click();
}

function onOne(e,si){
  var f=e.target.files[0]; if(!f) return;
  var j=pendingSlot;
  var r=new FileReader();
  r.onload=function(ev){photos[si][j]=ev.target.result; refreshGrid(si);};
  r.readAsDataURL(f);
  e.target.value='';
}

function onMulti(e,si){
  var files=Array.from(e.target.files).slice(0,3);
  var empty=[];
  for(var j=0;j<3;j++) if(!photos[si][j]) empty.push(j);
  var done=0, total=Math.min(files.length,empty.length);
  if(total===0) return;
  files.slice(0,total).forEach(function(f,fi){
    var slot=empty[fi];
    var r=new FileReader();
    r.onload=function(ev){
      photos[si][slot]=ev.target.result;
      done++;
      if(done===total) refreshGrid(si);
    };
    r.readAsDataURL(f);
  });
  e.target.value='';
}

function delPhoto(si,j){
  photos[si][j]=null;
  refreshGrid(si);
}

function refreshGrid(si){
  var el=document.getElementById('photoGrid'+si);
  if(el) el.outerHTML=renderPhotoGrid(si).replace('<div class="photo-wrap">','<div class="photo-wrap" id="photoGrid'+si+'">');
  // simpler: rebuild whole zone
  var z=document.getElementById('pgZone'+si);
  if(z) z.innerHTML=renderPhotoGrid(si);
}

function buildSlides(){
  var main=document.getElementById('main'),dots=document.getElementById('navDots');
  main.innerHTML=''; dots.innerHTML='';
  SLIDES.forEach(function(s,i){
    var d=document.createElement('div');
    d.className='dot'+(i===0?' active':'');
    d.onclick=(function(idx){return function(){goTo(idx);};})(i);
    dots.appendChild(d);

    var el=document.createElement('div');
    el.className='slide'+(i===0?' active':'');
    el.id='slide'+i;

    var boxHtml='<div class="content-grid">';
    s.boxes.forEach(function(b){
      boxHtml+='<div class="box '+b.cls+'"><h4>'+b.title+'</h4><ul>';
      b.items.forEach(function(it){boxHtml+='<li>'+it+'</li>';});
      boxHtml+='</ul></div>';
    });
    boxHtml+='</div>';

    var faultHtml='';
    if(s.fault){
      faultHtml='<div class="fault"><h4>⚠ FAULT</h4><ul>';
      s.fault.items.forEach(function(it){faultHtml+='<li>'+it+'</li>';});
      faultHtml+='</ul></div>';
    }

    el.innerHTML=
      '<div class="slide-header">'+
        '<div class="slide-num" style="background:'+s.bg+';border:2px solid '+s.color+';color:'+s.color+';">'+s.num+'</div>'+
        '<div class="slide-meta"><h2>'+s.title+'</h2>'+
          '<span class="phase-tag" style="background:'+s.phaseColor+';color:'+s.phaseText+';">'+s.phase+'</span>'+
        '</div>'+
      '</div>'+
      '<div id="pgZone'+i+'">'+renderPhotoGrid(i)+'</div>'+
      boxHtml+
      '<div class="'+s.feeling.cls+' feeling"><div class="feeling-icon">'+s.feeling.icon+'</div><div>'+s.feeling.text+'</div></div>'+
      faultHtml;

    main.appendChild(el);
  });
}

function goTo(idx){
  document.getElementById('slide'+current).classList.remove('active');
  document.querySelectorAll('.dot')[current].classList.remove('active');
  current=idx;
  document.getElementById('slide'+current).classList.add('active');
  document.querySelectorAll('.dot')[current].classList.add('active');
  document.getElementById('curSlide').textContent=current+1;
  document.getElementById('progressFill').style.width=((current+1)/7*100)+'%';
  document.getElementById('prevBtn').disabled=current===0;
  document.getElementById('nextBtn').disabled=current===6;
  document.getElementById('nextBtn').textContent=current===6?'✓ จบ':'ถัดไป →';
  window.scrollTo(0,0);
}
function changeSlide(dir){var n=current+dir;if(n>=0&&n<7)goTo(n);}
buildSlides();
</script>
</body>
</html>
